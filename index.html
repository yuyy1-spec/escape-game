<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>東京病院 ─ 廃墟からの脱出</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700&family=Noto+Sans+JP:wght@300;400&display=swap');

  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --surface2: #16161f;
    --border: #2a2a3a;
    --text: #c8c8d8;
    --text-dim: #6a6a80;
    --accent: #8b1a1a;
    --accent2: #a82020;
    --accent-glow: rgba(139,26,26,0.3);
    --gold: #b8956a;
    --white: #e8e8f0;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    font-weight: 300;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow-x: hidden;
  }

  #game {
    width: 100%;
    max-width: 480px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    position: relative;
  }

  #title-screen {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 24px;
    text-align: center;
    background: linear-gradient(180deg, #0a0a0f 0%, #12080a 100%);
  }

  .title-eyebrow {
    font-size: 10px;
    letter-spacing: 0.4em;
    color: var(--text-dim);
    text-transform: uppercase;
    margin-bottom: 32px;
  }

  .title-main {
    font-family: 'Noto Serif JP', serif;
    font-size: 32px;
    font-weight: 700;
    color: var(--white);
    letter-spacing: 0.15em;
    line-height: 1.4;
    margin-bottom: 8px;
  }

  .title-sub {
    font-size: 11px;
    letter-spacing: 0.3em;
    color: var(--accent2);
    margin-bottom: 48px;
  }

  .title-divider {
    width: 1px;
    height: 60px;
    background: linear-gradient(180deg, transparent, var(--accent), transparent);
    margin: 0 auto 48px;
  }

  .name-section {
    width: 100%;
    margin-bottom: 32px;
  }

  .name-label {
    font-size: 10px;
    letter-spacing: 0.3em;
    color: var(--text-dim);
    margin-bottom: 10px;
    text-align: left;
  }

  .name-input {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 2px;
    color: var(--white);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 16px;
    padding: 12px 16px;
    outline: none;
    transition: border-color 0.2s;
  }

  .name-input:focus { border-color: var(--accent); }
  .name-input::placeholder { color: var(--text-dim); font-size: 14px; }

  .start-btn {
    width: 100%;
    padding: 16px;
    background: var(--accent);
    border: none;
    border-radius: 2px;
    color: var(--white);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 14px;
    letter-spacing: 0.3em;
    cursor: pointer;
    transition: background 0.2s, box-shadow 0.2s;
    margin-top: 8px;
  }

  .start-btn:active {
    background: var(--accent2);
    box-shadow: 0 0 20px var(--accent-glow);
  }

  .warning-text {
    font-size: 10px;
    color: var(--text-dim);
    margin-top: 32px;
    line-height: 1.8;
    letter-spacing: 0.05em;
  }

  #game-screen {
    flex: 1;
    display: none;
    flex-direction: column;
  }

  .location-bar {
    padding: 12px 20px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 10;
  }

  .location-name {
    font-size: 10px;
    letter-spacing: 0.3em;
    color: var(--text-dim);
  }

  .mistake-counter {
    font-size: 10px;
    color: var(--accent);
    letter-spacing: 0.1em;
  }

  .scene-area {
    flex: 1;
    padding: 24px 20px;
    overflow-y: auto;
  }

  .scene-text {
    font-size: 14px;
    line-height: 2;
    color: var(--text);
    margin-bottom: 20px;
    white-space: pre-wrap;
  }

  .partner-speech {
    background: var(--surface2);
    border-left: 2px solid var(--gold);
    padding: 14px 16px;
    margin: 16px 0;
    border-radius: 0 2px 2px 0;
  }

  .partner-name {
    font-size: 10px;
    color: var(--gold);
    letter-spacing: 0.2em;
    margin-bottom: 6px;
  }

  .partner-text {
    font-size: 13px;
    line-height: 1.9;
    color: var(--text);
    font-style: italic;
  }

  .choices {
    padding: 0 20px 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .choice-btn {
    width: 100%;
    padding: 14px 18px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 2px;
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 13px;
    text-align: left;
    cursor: pointer;
    transition: all 0.15s;
    line-height: 1.6;
  }

  .choice-btn:active {
    background: var(--surface2);
    border-color: var(--accent);
    color: var(--white);
  }

  .choice-btn::before {
    content: '▶ ';
    color: var(--accent);
    font-size: 10px;
  }

  .puzzle-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 2px;
    padding: 20px;
    margin: 16px 0;
  }

  .puzzle-title {
    font-size: 10px;
    letter-spacing: 0.3em;
    color: var(--accent2);
    margin-bottom: 16px;
  }

  .clue-item {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 2px;
    padding: 12px 14px;
    margin-bottom: 8px;
    font-size: 13px;
    line-height: 1.7;
    cursor: pointer;
    transition: border-color 0.15s;
  }

  .clue-item.revealed {
    border-color: var(--gold);
    color: var(--white);
    cursor: default;
  }

  .clue-item:not(.revealed) { color: var(--text-dim); }

  .clue-item .tap-hint {
    font-size: 10px;
    color: var(--text-dim);
    margin-top: 4px;
  }

  /* コード入力エリア：常に表示、パズル中のみアクティブ */
  .code-input-area {
    padding: 16px 20px;
    border-top: 1px solid var(--border);
    background: var(--surface);
  }

  .code-label {
    font-size: 10px;
    letter-spacing: 0.3em;
    color: var(--text-dim);
    margin-bottom: 12px;
  }

  .code-row {
    display: flex;
    gap: 10px;
    align-items: stretch;
  }

  .code-input {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 2px;
    color: var(--white);
    font-family: 'Noto Serif JP', serif;
    font-size: 20px;
    padding: 12px 16px;
    letter-spacing: 0.3em;
    outline: none;
    transition: border-color 0.2s;
  }

  .code-input:focus { border-color: var(--accent); }

  .code-input:disabled {
    opacity: 0.3;
    cursor: not-allowed;
  }

  .code-submit {
    padding: 12px 20px;
    background: var(--accent);
    border: none;
    border-radius: 2px;
    color: var(--white);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 12px;
    letter-spacing: 0.2em;
    cursor: pointer;
    transition: background 0.15s, opacity 0.15s;
    white-space: nowrap;
  }

  .code-submit:disabled {
    opacity: 0.3;
    cursor: not-allowed;
  }

  .code-submit:not(:disabled):active { background: var(--accent2); }

  .hint-box {
    background: rgba(139,26,26,0.08);
    border: 1px solid var(--accent);
    border-radius: 2px;
    padding: 12px 14px;
    margin-top: 12px;
    font-size: 12px;
    color: var(--accent2);
    line-height: 1.8;
    display: none;
  }

  .hint-box.visible { display: block; }

  /* 並び替えUI */
  .sort-area { margin: 16px 0; }

  .sort-label {
    font-size: 11px;
    color: var(--text-dim);
    margin-bottom: 10px;
    letter-spacing: 0.1em;
  }

  .sort-chars {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 16px;
  }

  .sort-char {
    width: 52px;
    height: 52px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 2px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Noto Serif JP', serif;
    font-size: 20px;
    color: var(--white);
    cursor: pointer;
    transition: all 0.15s;
    position: relative;
  }

  .sort-char.selected {
    border-color: var(--accent2);
    background: rgba(139,26,26,0.15);
    opacity: 0.5;
    cursor: default;
  }

  .sort-result {
    display: flex;
    gap: 8px;
    min-height: 52px;
    border: 1px dashed var(--border);
    border-radius: 2px;
    padding: 8px;
    align-items: center;
  }

  .sort-slot {
    width: 52px;
    height: 36px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 2px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Noto Serif JP', serif;
    font-size: 18px;
    color: var(--white);
    cursor: pointer;
    transition: background 0.15s;
  }

  .sort-slot:hover { background: var(--accent); }

  .sort-clear {
    padding: 8px 16px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 2px;
    color: var(--text-dim);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 11px;
    cursor: pointer;
    margin-top: 10px;
  }

  #gameover-screen {
    display: none;
    flex: 1;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 24px;
    text-align: center;
    background: linear-gradient(180deg, #0a0a0f 0%, #150505 100%);
  }

  .go-title {
    font-family: 'Noto Serif JP', serif;
    font-size: 24px;
    color: var(--accent2);
    letter-spacing: 0.2em;
    margin-bottom: 16px;
  }

  .go-text {
    font-size: 13px;
    color: var(--text-dim);
    line-height: 2;
    margin-bottom: 40px;
    white-space: pre-wrap;
  }

  .go-btn {
    padding: 14px 40px;
    background: transparent;
    border: 1px solid var(--accent);
    border-radius: 2px;
    color: var(--accent2);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 13px;
    letter-spacing: 0.3em;
    cursor: pointer;
  }

  #ending-screen {
    display: none;
    flex: 1;
    flex-direction: column;
    padding: 0;
    background: #0a0a0f;
  }

  .ending-content {
    flex: 1;
    overflow-y: auto;
    padding: 40px 24px;
  }

  .ending-text {
    font-size: 14px;
    line-height: 2.2;
    color: var(--text);
    margin-bottom: 20px;
    white-space: pre-wrap;
  }

  .ending-speech {
    background: var(--surface2);
    border-left: 2px solid var(--gold);
    padding: 14px 16px;
    margin: 20px 0;
    border-radius: 0 2px 2px 0;
  }

  .ending-speech .partner-text { color: var(--gold); }

  .ending-record {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 20px;
    margin: 24px 0;
    border-radius: 2px;
    font-size: 12px;
    color: var(--text-dim);
    line-height: 2;
  }

  .ending-record .red { color: var(--accent2); font-weight: 700; }

  .ending-final {
    text-align: center;
    padding: 40px 0 60px;
  }

  .ending-final-text {
    font-family: 'Noto Serif JP', serif;
    font-size: 15px;
    color: var(--white);
    line-height: 2.4;
    margin-bottom: 32px;
    white-space: pre-wrap;
  }

  .ending-title-card {
    font-size: 10px;
    letter-spacing: 0.4em;
    color: var(--text-dim);
    margin-top: 48px;
  }

  .replay-btn {
    padding: 14px 40px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 2px;
    color: var(--text-dim);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 12px;
    letter-spacing: 0.3em;
    cursor: pointer;
    margin-top: 40px;
  }

  .fade-in { animation: fadeIn 0.6s ease forwards; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .flicker { animation: flicker 3s infinite; }

  @keyframes flicker {
    0%, 95%, 100% { opacity: 1; }
    96% { opacity: 0.4; }
    97% { opacity: 1; }
    98% { opacity: 0.2; }
    99% { opacity: 0.9; }
  }

  .mt-16 { margin-top: 16px; }

  ::-webkit-scrollbar { width: 2px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); }
</style>
</head>
<body>
<div id="game">

  <!-- タイトル -->
  <div id="title-screen">
    <div class="title-eyebrow">escape from</div>
    <div class="title-main flicker">東京病院</div>
    <div class="title-sub">─ 廃墟からの脱出 ─</div>
    <div class="title-divider"></div>

    <div class="name-section">
      <div class="name-label">あなたの名前</div>
      <input class="name-input" id="player-name" type="text" maxlength="10" placeholder="名前を入力してください">
    </div>
    <div class="name-section">
      <div class="name-label">パートナーの名前</div>
      <input class="name-input" id="partner-name" type="text" maxlength="10" placeholder="名前を入力してください" value="ゆうたい">
    </div>

    <button class="start-btn" onclick="startGame()">入　院　記　録　を　開　く</button>

    <div class="warning-text">
      ⚠ このゲームはホラー演出を含みます。<br>
      心臓の弱い方はご注意ください。
    </div>
  </div>

  <!-- ゲーム画面 -->
  <div id="game-screen">
    <div class="location-bar">
      <div class="location-name" id="location-name">─</div>
      <div class="mistake-counter" id="mistake-display"></div>
    </div>
    <div class="scene-area" id="scene-area"></div>
    <div class="choices" id="choices-area"></div>
    <!-- コード入力：常に表示、パズルがないときはdisabled -->
    <div class="code-input-area" id="code-area">
      <div class="code-label" id="code-label">── 解答入力 ──</div>
      <div class="code-row">
        <input class="code-input" id="code-input" type="text" maxlength="6"
          autocomplete="off" autocorrect="off" spellcheck="false" disabled>
        <button class="code-submit" id="code-submit-btn" onclick="submitCode()" disabled>送　信</button>
      </div>
      <div class="hint-box" id="hint-box"></div>
    </div>
  </div>

  <!-- ゲームオーバー -->
  <div id="gameover-screen">
    <div class="go-title">─ 力 尽 き た ─</div>
    <div class="go-text" id="go-text"></div>
    <button class="go-btn" onclick="resetGame()">最初からやり直す</button>
  </div>

  <!-- エンディング -->
  <div id="ending-screen">
    <div class="ending-content" id="ending-content"></div>
  </div>

</div>

<script>
let state = {
  playerName: '',
  partnerName: '',
  currentScene: 'prologue',
  currentPuzzle: null,
  mistakes: 0,
  cluesFound: {},
  sortSelected: [],
  sortResult: [],
};

const MAX_MISTAKES = 5;
const HINT_THRESHOLD = 3;

function P() { return state.partnerName; }
function Me() { return state.playerName; }

// ===== パズル定義 =====
// ※ hint3/hint5 はstartGame後にパートナー名で上書き
const puzzles = {
  puzzle1: {
    answer: '4172',
    label: 'ロッカーのコードを入力（4桁の数字）',
    hint3: 'PARTNER「……床を、よく見て。誰かがメモを落としている」',
    nextScene: 'hall_clear',
  },
  puzzle2: {
    answer: '3172',
    label: '扉のコードを入力（4桁の数字）',
    hint3: 'PARTNER「……マップを見て。エリアの番号順に、雑誌のNo.を読んでみて」',
    nextScene: 'waiting_clear',
  },
  puzzle3: {
    answer: '2568',
    label: '金庫のコードを入力（4桁の数字）',
    hint3: 'PARTNER「……テープの番号順に、パックの数字を読んで」',
    nextScene: 'surgery_clear',
  },
  puzzle4: {
    answer: 'きおく',
    label: 'カルテの言葉を入力（ひらがな）',
    hint3: 'PARTNER「……番号の逆から読んでみて。③→②→①の順に」',
    nextScene: 'office_clear',
  },
  puzzle5: {
    answer: '0309',
    label: '脱出扉のコードを入力（4桁の数字）',
    hint3: 'PARTNER「……手紙の日付を4桁で。3月9日なら……」',
    nextScene: 'ending',
  },
};

// ===== シーン定義 =====
const scenes = {

  prologue: {
    location: '── 記憶の断片 ──',
    puzzle: null,
    render() {
      setScene(`目が覚めると、天井が見えた。

剥がれかけたペンキ。錆びた蛍光灯。
かび臭い空気が、肺に張り付く。

ここが病院だと気づくのに、少し時間がかかった。

東京病院──
数年前に廃院になった、あの病院だ。

なぜここにいるのか、わからない。
最後の記憶が、ぼんやりとしている。`, [
        { text: '体を起こす', next: 'prologue2' }
      ]);
    }
  },

  prologue2: {
    location: '── 記憶の断片 ──',
    puzzle: null,
    render() {
      setScene(`体を起こすと、頭が重い。

白衣を着た青年が、こちらを見ていた。
穏やかな目。でも、どこか遠い。`, [], () => {
        addPartnerSpeech(P(), 'よかった。気がついた……。起き上がれる？');
        setTimeout(() => {
          setChoices([{ text: '「お前は……誰だ？」', next: 'prologue3' }]);
        }, 300);
      });
    }
  },

  prologue3: {
    location: '── 記憶の断片 ──',
    puzzle: null,
    render() {
      setScene(`青年は少し間を置いてから、静かに答えた。`, [], () => {
        addPartnerSpeech(P(), `${P()}。……ここで働いていた。\n君のことが、心配で`);
        setTimeout(() => {
          addText(`名前は聞いたことがあるような、ないような。
頭痛がして、それ以上考えられない。

とにかく──ここから出なければ。`);
          setChoices([{ text: '「一緒に、出口を探そう」', next: 'hall_intro' }]);
        }, 400);
      });
    }
  },

  // ===== 謎① 入口ホール =====
  hall_intro: {
    location: '東京病院 ─ 入口ホール',
    puzzle: 'puzzle1',
    render() {
      setScene(`非常灯だけが赤く灯るホール。

壁には古い案内板。
床には埃と、誰かが引きずった跡。

ロッカーが並んでいる。鍵がかかっている。
何か手がかりがあるはずだ。`, [
        { text: '点滴スタンドを調べる', next: 'hall_drip' },
        { text: '壁の対応表を調べる', next: 'hall_wall' },
        { text: '床を調べる', next: 'hall_floor' },
      ]);
    }
  },

  hall_drip: {
    location: '東京病院 ─ 入口ホール',
    puzzle: 'puzzle1',
    render() {
      state.cluesFound.drip = true;
      setScene(`点滴スタンドが3本並んでいる。
それぞれのタグに、記号が書かれている。

  △のタグ
  ○のタグ
  ▲のタグ
  □のタグ

記号だけでは、意味がわからない。
何かと対応させる必要がありそうだ。`, [
        { text: '← ホールに戻る', next: 'hall_intro' },
      ]);
    }
  },

  hall_wall: {
    location: '東京病院 ─ 入口ホール',
    puzzle: 'puzzle1',
    render() {
      state.cluesFound.wall = true;
      setScene(`壁に、紙が貼られている。
ほとんど破れているが、かろうじて読める。

  △ ＝ 4
  ○ ＝ ？（破れて読めない）
  ▲ ＝ 7
  □ ＝ 2

○だけが、わからない。`, [
        { text: '← ホールに戻る', next: 'hall_intro' },
      ]);
    }
  },

  hall_floor: {
    location: '東京病院 ─ 入口ホール',
    puzzle: 'puzzle1',
    render() {
      setScene(``, [], () => {
        addPartnerSpeech(P(), '……なんか、落ちてるよ。そこ');
        setTimeout(() => {
          state.cluesFound.floor = true;
          addText(`床に、小さなメモが落ちていた。

埃まみれだが、文字が読める。

  ○ ＝ 1

// ===== 並び替えUI（謎④）=====
function renderSortUI() {
  const scene = document.getElementById('scene-area');

  const chars = [
    { id: 'sc1', num: '①', char: 'く' },
    { id: 'sc2', num: '②', char: 'お' },
    { id: 'sc3', num: '③', char: 'き' },
  ];

  const sortBox = document.createElement('div');
  sortBox.className = 'puzzle-box sort-area';
  sortBox.innerHTML = `
    <div class="puzzle-title">── 血の下の文字 ──</div>
    <div class="sort-label">文字をタップして並べよう</div>
    <div class="sort-chars" id="sort-chars"></div>
    <div class="sort-label" style="margin-top:8px;">並べた結果（スロットをタップで取り消し）</div>
    <div class="sort-result" id="sort-result"></div>
    <button class="sort-clear" onclick="clearSort()">全部やり直す</button>
  `;
  scene.appendChild(sortBox);

  const charsEl = sortBox.querySelector('#sort-chars');
  chars.forEach(c => {
    const el = document.createElement('div');
    el.className = 'sort-char';
    el.id = c.id;
    el.innerHTML = `<span style="position:absolute;top:3px;left:5px;font-size:9px;color:var(--accent2);font-family:'Noto Sans JP',sans-serif;">${c.num}</span>${c.char}`;
    el.onclick = () => selectSortChar(c.id, c.char);
    charsEl.appendChild(el);
  });
}

function selectSortChar(id, char) {
  if (state.sortResult.length >= 3) return;
  if (state.sortSelected.includes(id)) return;

  state.sortSelected.push(id);
  state.sortResult.push({ id, char });

  const srcEl = document.getElementById(id);
  if (srcEl) srcEl.classList.add('selected');

  const result = document.getElementById('sort-result');
  const slot = document.createElement('div');
  slot.className = 'sort-slot';
  slot.textContent = char;
  slot.title = 'タップして取り消し';
  const slotIndex = state.sortResult.length - 1;
  slot.onclick = () => removeSortSlot(slotIndex, slot);
  result.appendChild(slot);

  // 3文字揃ったら自動でコード入力欄に反映
  if (state.sortResult.length === 3) {
    const word = state.sortResult.map(r => r.char).join('');
    document.getElementById('code-input').value = word;
  }
}

function removeSortSlot(index, slotEl) {
  const removed = state.sortResult.splice(index, 1)[0];
  if (removed) {
    state.sortSelected = state.sortSelected.filter(id => id !== removed.id);
    const srcEl = document.getElementById(removed.id);
    if (srcEl) srcEl.classList.remove('selected');
  }
  slotEl.remove();
  // 残りのスロットのindexを再設定
  const result = document.getElementById('sort-result');
  Array.from(result.children).forEach((s, i) => {
    s.onclick = () => removeSortSlot(i, s);
  });
  // コード入力欄を更新
  document.getElementById('code-input').value = state.sortResult.map(r => r.char).join('');
}

function clearSort() {
  state.sortSelected = [];
  state.sortResult = [];
  document.querySelectorAll('.sort-char').forEach(el => el.classList.remove('selected'));
  const result = document.getElementById('sort-result');
  if (result) result.innerHTML = '';
  document.getElementById('code-input').value = '';
}

// ===== ゲームロジック =====
function startGame() {
  const pn = document.getElementById('player-name').value.trim();
  const pa = document.getElementById('partner-name').value.trim();
  if (!pn) { alert('名前を入力してください'); return; }
  if (!pa) { alert('パートナーの名前を入力してください'); return; }

  state.playerName = pn;
  state.partnerName = pa;

  // パートナー名をヒントに反映
  Object.keys(puzzles).forEach(k => {
    puzzles[k].hint3 = puzzles[k].hint3.replace(/PARTNER/g, pa);
  });

  document.getElementById('title-screen').style.display = 'none';
  const gs = document.getElementById('game-screen');
  gs.style.display = 'flex';
  gs.style.flexDirection = 'column';

  goToScene('prologue');
}

function goToScene(sceneId) {
  state.currentScene = sceneId;
  state.mistakes = 0;
  state.sortSelected = [];
  state.sortResult = [];
  updateMistakeDisplay();

  document.getElementById('scene-area').innerHTML = '';
  document.getElementById('choices-area').innerHTML = '';
  document.getElementById('hint-box').className = 'hint-box';
  document.getElementById('hint-box').textContent = '';
  document.getElementById('code-input').value = '';

  const scene = scenes[sceneId];
  if (!scene) return;

  document.getElementById('location-name').textContent = scene.location;

  // パズルIDに応じてコード入力の有効・無効を切り替え
  const puzzleId = scene.puzzle;
  state.currentPuzzle = puzzleId || null;

  const codeInput = document.getElementById('code-input');
  const codeBtn = document.getElementById('code-submit-btn');
  const codeLabel = document.getElementById('code-label');

  if (puzzleId && puzzles[puzzleId]) {
    codeInput.disabled = false;
    codeBtn.disabled = false;
    codeLabel.textContent = puzzles[puzzleId].label;
  } else {
    codeInput.disabled = true;
    codeBtn.disabled = true;
    codeLabel.textContent = '── 解答入力 ──';
  }

  scene.render();
  document.getElementById('scene-area').scrollTop = 0;
}

function setScene(text, choices, callback) {
  const sceneArea = document.getElementById('scene-area');
  sceneArea.innerHTML = '';

  if (text) {
    const textEl = document.createElement('div');
    textEl.className = 'scene-text fade-in';
    textEl.textContent = text;
    sceneArea.appendChild(textEl);
  }

  if (callback) {
    setTimeout(callback, 100);
  } else {
    setChoices(choices);
  }
}

function addText(text) {
  const sceneArea = document.getElementById('scene-area');
  const el = document.createElement('div');
  el.className = 'scene-text fade-in mt-16';
  el.textContent = text;
  sceneArea.appendChild(el);
}

function addPartnerSpeech(name, text) {
  const sceneArea = document.getElementById('scene-area');
  const el = document.createElement('div');
  el.className = 'partner-speech fade-in';
  el.innerHTML = `<div class="partner-name">${name}</div><div class="partner-text">${text.replace(/\n/g,'<br>')}</div>`;
  sceneArea.appendChild(el);
}

function setChoices(choices) {
  const area = document.getElementById('choices-area');
  area.innerHTML = '';
  (choices || []).forEach(c => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.textContent = c.text;
    btn.onclick = () => goToScene(c.next);
    area.appendChild(btn);
  });
}

function updateMistakeDisplay() {
  const el = document.getElementById('mistake-display');
  el.textContent = state.mistakes > 0 ? `誤入力 ${state.mistakes} / ${MAX_MISTAKES}` : '';
}

function submitCode() {
  if (!state.currentPuzzle) return;
  const input = document.getElementById('code-input').value.trim();
  const puzzle = puzzles[state.currentPuzzle];
  if (!input) return;

  if (input === puzzle.answer) {
    state.currentPuzzle = null;
    state.mistakes = 0;
    updateMistakeDisplay();
    document.getElementById('choices-area').innerHTML = '';
    goToScene(puzzle.nextScene);
  } else {
    state.mistakes++;
    updateMistakeDisplay();

    if (state.mistakes >= MAX_MISTAKES) {
      showGameOver();
      return;
    }

    if (state.mistakes >= HINT_THRESHOLD) {
      const hintBox = document.getElementById('hint-box');
      hintBox.className = 'hint-box visible';
      hintBox.textContent = puzzle.hint3;
    }

    document.getElementById('code-input').value = '';
    const ci = document.getElementById('code-input');
    ci.style.borderColor = 'var(--accent2)';
    setTimeout(() => { ci.style.borderColor = ''; }, 600);
  }
}

document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && state.currentPuzzle) submitCode();
});

function showGameOver() {
  document.getElementById('game-screen').style.display = 'none';
  const go = document.getElementById('gameover-screen');
  go.style.display = 'flex';
  go.style.flexDirection = 'column';
  document.getElementById('go-text').textContent =
    `${P()}の声が、遠くなっていく。\n\n「……ごめん、俺の力じゃここまでしか」\n\n暗闇が、${Me()}を包んだ。`;
}

function resetGame() {
  state = {
    playerName: state.playerName,
    partnerName: state.partnerName,
    currentScene: 'prologue',
    currentPuzzle: null,
    mistakes: 0,
    cluesFound: {},
    sortSelected: [],
    sortResult: [],
  };
  document.getElementById('gameover-screen').style.display = 'none';
  document.getElementById('ending-screen').style.display = 'none';
  const gs = document.getElementById('game-screen');
  gs.style.display = 'flex';
  gs.style.flexDirection = 'column';
  goToScene('prologue');
}
